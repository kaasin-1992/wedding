<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Одне фото на всіх — Катя & Діма, 06.09.2026</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%B8%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EBEBE3;--surface:#F8F8F3;
  --text:#222633;--muted:#6E7484;
  --rose:#A8505F;--rose-dim:#F0DEE1;
  --line:#D5D4C7;
  --serif:'Unbounded','Manrope',sans-serif;
  --sans:'Manrope',-apple-system,sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#15171E;--surface:#1E212A;
    --text:#ECEAE0;--muted:#9AA0AE;
    --rose:#D58597;--rose-dim:#34232A;
    --line:#313644;
  }
}
:root[data-theme="dark"]{
  --bg:#15171E;--surface:#1E212A;
  --text:#ECEAE0;--muted:#9AA0AE;
  --rose:#D58597;--rose-dim:#34232A;
  --line:#313644;
}
:root[data-theme="light"]{
  --bg:#EBEBE3;--surface:#F8F8F3;
  --text:#222633;--muted:#6E7484;
  --rose:#A8505F;--rose-dim:#F0DEE1;
  --line:#D5D4C7;
}
.theme-toggle{position:fixed;top:14px;right:14px;width:42px;height:42px;border-radius:50%;
  border:1px solid var(--line);background:var(--surface);box-shadow:0 2px 10px rgba(0,0,0,.08);cursor:pointer;
  font-size:18px;display:flex;align-items:center;justify-content:center;z-index:500}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased;display:flex;min-height:100vh;align-items:center}
.wrap{max-width:480px;margin:0 auto;padding:32px 22px;text-align:center}
.eyebrow{font-size:12.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
h1{font-family:var(--serif);font-weight:800;font-size:24px;margin:0 0 14px;color:var(--rose)}
.card{background:var(--surface);border-radius:16px;padding:22px 20px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.card p{margin:0 0 10px;font-size:15px}
.hint{font-size:13px;color:var(--muted);margin-top:16px}
.ph{width:100%;aspect-ratio:4/3;border-radius:12px;border:2px dashed var(--line);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;margin-bottom:16px}
.shot{width:100%;border-radius:12px;margin-bottom:16px;display:block}
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" aria-label="Перемкнути тему" title="Перемкнути тему">🌙</button>
<div class="wrap">
  <div class="eyebrow">Weддінг · 06.09.2026 · камера "Одне фото на всіх"</div>
  <div id="content"></div>
</div>
<script>
// Список фото-референсів для повторення. Кожне відкриття сторінки показує
// випадкове фото з цього списку. Щоб додати нове фото: покласти файл у
// ./images/ і додати його ім'я в цей масив -- QR-код на наклейці міняти не треба.
const PHOTOS = [
  // 'images/photo1.jpg',
  // 'images/photo2.jpg',
];

const el = document.getElementById('content');
if (PHOTOS.length > 0) {
  const pick = PHOTOS[Math.floor(Math.random() * PHOTOS.length)];
  el.innerHTML = `
    <h1>Повтори оце 📸</h1>
    <div class="card">
      <img class="shot" src="${pick}" alt="фото для повторення">
      <p class="hint">Онови сторінку — випаде інший кадр з тих, що ми зібрали.</p>
    </div>`;
} else {
  el.innerHTML = `
    <h1>Фото ще в дорозі 📸</h1>
    <div class="card">
      <div class="ph">тут з'явиться кадр, який треба повторити</div>
      <p>Катя й Діма скоро додадуть сюди фото-референси.</p>
      <p class="hint">Заскануй цей QR ще раз ближче до весілля, якщо зараз тут порожньо — сторінка оновиться сама, наклейку міняти не треба.</p>
    </div>`;
}

(function(){
  const btn=document.getElementById('themeToggle');
  const sysDark=()=>window.matchMedia('(prefers-color-scheme: dark)').matches;
  function apply(mode){
    if(mode) document.documentElement.setAttribute('data-theme',mode);
    else document.documentElement.removeAttribute('data-theme');
    btn.textContent=(mode==='dark'||(!mode&&sysDark()))?'☀️':'🌙';
  }
  let saved=null; try{ saved=localStorage.getItem('wed-page-theme'); }catch(e){}
  apply(saved);
  btn.onclick=()=>{
    const cur=document.documentElement.getAttribute('data-theme')||(sysDark()?'dark':'light');
    const next=cur==='dark'?'light':'dark';
    try{ localStorage.setItem('wed-page-theme',next); }catch(e){}
    apply(next);
  };
})();
</script>
</body>
</html>
